<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GAIOL</title>
  <style>
    :root { --bg: #0f0f12; --surface: #1a1a1f; --text: #e8e8ed; --muted: #888; --accent: #6366f1; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    p { color: var(--muted); margin: 0 0 1.5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dashboard</h1>
    <p>Welcome. Manage your provider keys and GAIOL API keys from here (coming in later phases).</p>
    <div class="nav">
      <a href="/">Home</a> &middot; <a href="/login">Login</a> &middot; <a href="#" id="logoutLink">Logout</a>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    (function() {
      if (typeof isAuthenticated !== 'function' || !isAuthenticated()) {
        window.location.href = '/login';
        return;
      }
      document.getElementById('logoutLink').addEventListener('click', function(e) {
        e.preventDefault();
        (async function() {
          try {
            if (typeof signOut === 'function') await signOut();
          } catch (err) {}
          window.location.href = '/';
        })();
      });
    })();
  </script>
</body>
</html>
