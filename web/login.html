<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GAIOL</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Sign in to GAIOL - Unified AI Model Orchestration Platform">
    <meta name="keywords" content="AI, machine learning, LLM, GPT, AI models, model comparison">
    <meta name="author" content="GAIOL">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sign In - GAIOL">
    <meta property="og:description" content="Sign in to access AI model orchestration">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:title" content="Sign In - GAIOL">
    <meta property="twitter:description" content="Sign in to access AI model orchestration">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">

    <!-- Mono font (terminal UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="page active auth-page auth-terminal">
        <div class="auth-container">
            <div class="auth-card">
                <div class="term-bar" aria-hidden="true">
                    <span class="term-dot"></span>
                    <span class="term-dot"></span>
                    <span class="term-dot"></span>
                    <span class="term-title">gaiol://auth/signin</span>
                </div>
                <div class="auth-header">
                    <h1>GAIOL Access Terminal</h1>
                    <p>Authenticate to access AI model orchestration.</p>
                </div>
                <div class="term-screen" aria-hidden="true">
                    <div class="line comment">session: unauthenticated</div>
                    <div class="line"><span class="prompt"></span><span class="out">gaiol auth signin --email &lt;email&gt;</span><span class="blink">█</span></div>
                </div>
                <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                            autocomplete="email"
                        >
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password"
                        >
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="link-text" id="forgotPasswordLink">Forgot password?</a>
                    </div>
                    <div id="forgotPasswordForm" class="form-group term-inline-box" style="display: none;">
                        <label for="forgotEmail">Enter your email to receive a reset link</label>
                        <input type="email" id="forgotEmail" placeholder="your@email.com">
                        <div class="term-actions">
                            <button type="button" class="btn-primary" id="forgotSubmitBtn">Send reset link</button>
                            <button type="button" class="btn-secondary" id="forgotCancelBtn">Cancel</button>
                        </div>
                        <p id="forgotMessage" class="term-message" style="display: none;"></p>
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="loginBtn">
                        <span id="loginBtnText">Sign In</span>
                        <span id="loginBtnSpinner" class="spinner-small" style="display: none;"></span>
                    </button>
                    <div class="auth-divider">
                        <span>or</span>
                    </div>
                    <button type="button" class="btn-secondary btn-full" onclick="window.location.href='/signup'">
                        Create new account (signup)
                    </button>
                </form>
                <div id="loginError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/models.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/features.js"></script>
    <script src="/js/sidebar-features.js"></script>
    <script src="/js/design-enhancements.js"></script>
    
    <script>
        // Login page - no layout needed, it's a standalone auth page
        document.addEventListener('DOMContentLoaded', function() {
            // Enable scrolling on body for auth pages
            document.body.style.overflowY = 'auto';
            
            // If already authenticated, redirect to dashboard
            if (typeof isAuthenticated === 'function' && isAuthenticated()) {
                window.location.href = '/dashboard';
                return;
            }
            
            // Initialize auth
            if (typeof initAuth === 'function') {
                initAuth();
            }
        });
    </script>
</body>
</html>
