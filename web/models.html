<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Models - GAIOL</title>

    <!-- Meta Tags -->
    <meta name="description" content="Browse and select AI models on GAIOL">
    <meta name="keywords" content="AI models, LLM, GPT, model selection">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">

    <link rel="stylesheet" href="/css/styles.css">
    <script>
        // Immediate auth check - redirect to login if not authenticated
        (function () {
            try {
                const token = localStorage.getItem('gaiol_access_token');
                if (!token) {
                    window.location.href = '/login.html';
                }
            } catch (e) {
                window.location.href = '/login.html';
            }
        })();
    </script>
</head>

<body class="models-page">
    <div class="app-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Models Page -->
            <div id="modelsPage" class="page active models-page-redesigned">
                <!-- Top Search and Actions Bar -->
                <div class="models-top-bar">
                    <div class="models-search-section">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input type="text" id="modelsSearchInput" class="models-search-input" placeholder="Search models by name, provider, or capability..." autocomplete="off">
                            <button class="search-clear-btn" id="searchClearBtn" style="display: none;" onclick="clearSearchInput()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="models-actions-section">
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="grid" onclick="setModelView('grid')" title="Grid View">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7"></rect>
                                    <rect x="14" y="3" width="7" height="7"></rect>
                                    <rect x="14" y="14" width="7" height="7"></rect>
                                    <rect x="3" y="14" width="7" height="7"></rect>
                                </svg>
                            </button>
                            <button class="view-btn" data-view="list" onclick="setModelView('list')" title="List View">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                        <button class="btn-icon-secondary" onclick="refreshModels()" title="Refresh Models">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                                <path d="M21 3v5h-5"></path>
                                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                                <path d="M3 21v-5h5"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="models-content-wrapper">
                    <!-- Filter Sidebar -->
                    <aside class="models-filter-sidebar" id="modelsFilterSidebar">
                        <div class="filter-sidebar-header">
                            <h3>Filters</h3>
                            <button class="btn-icon-small" onclick="toggleFilterSidebar()" id="filterSidebarToggle" title="Toggle Filters">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 12h18M3 6h18M3 18h18"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="filter-sidebar-content">
                            <div id="filterControls" class="filter-controls-redesigned"></div>
                        </div>
                    </aside>

                    <!-- Main Content Area -->
                    <main class="models-main-content">
                        <!-- Header Section -->
                        <div class="models-header-section">
                            <div class="models-header-left">
                                <h1 class="models-page-title">AI Models</h1>
                                <p class="models-page-subtitle">Discover and select models for your AI workflows</p>
                            </div>
                            <div class="models-header-right">
                                <div class="models-metrics-compact">
                                    <div class="metric-compact">
                                        <span class="metric-compact-value" id="totalModelsCount">0</span>
                                        <span class="metric-compact-label">Total</span>
                                    </div>
                                    <div class="metric-compact">
                                        <span class="metric-compact-value accent" id="selectedModelsCount">0</span>
                                        <span class="metric-compact-label">Selected</span>
                                    </div>
                                    <div class="metric-compact">
                                        <span class="metric-compact-value" id="totalProvidersCount">0</span>
                                        <span class="metric-compact-label">Providers</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Bulk Actions Bar -->
                        <div class="models-bulk-actions" id="modelsBulkActions" style="display: none;">
                            <div class="bulk-actions-left">
                                <span class="bulk-selection-count" id="bulkSelectionCount">0 models selected</span>
                            </div>
                            <div class="bulk-actions-right">
                                <button class="btn-bulk-action" onclick="selectAllFreeModels()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 11l3 3L22 4"></path>
                                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"></path>
                                    </svg>
                                    Select Free
                                </button>
                                <button class="btn-bulk-action" onclick="selectAllModels()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <path d="M9 9h6v6H9z"></path>
                                    </svg>
                                    Select All
                                </button>
                                <button class="btn-bulk-action" onclick="deselectAllModels()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    </svg>
                                    Clear
                                </button>
                            </div>
                        </div>

                        <!-- Sort and View Options -->
                        <div class="models-toolbar">
                            <div class="toolbar-left">
                                <div class="sort-selector">
                                    <label for="modelSortSelect" class="sort-label">Sort by:</label>
                                    <select id="modelSortSelect" class="sort-select" onchange="handleModelSort(this.value)">
                                        <option value="name">Name (A-Z)</option>
                                        <option value="provider">Provider</option>
                                        <option value="cost">Cost (Low to High)</option>
                                        <option value="quality">Quality Score</option>
                                    </select>
                                </div>
                            </div>
                            <div class="toolbar-right">
                                <span class="results-count" id="filteredResultsCount">0 models</span>
                            </div>
                        </div>

                        <!-- Model Grid/List Container -->
                        <div id="modelGridContainer" class="model-grid-redesigned"></div>
                    </main>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/models.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/features.js"></script>
    <script src="/js/sidebar-features.js"></script>
    <script src="/js/design-enhancements.js"></script>

    <script>
        // Initialize layout for models page
        document.addEventListener('DOMContentLoaded', async function () {
            // Check authentication first
            if (typeof isAuthenticated === 'function' && !isAuthenticated()) {
                window.location.href = '/login.html';
                return;
            }

            initializeLayout('Models', 'models');
            // Load models and render
            showLoading('Loading models...');
            loadModelsFromAPI().then(() => {
                renderModelSelection();
                renderFilterControls();
                hideLoading();
            }).catch(error => {
                hideLoading();
                showToast('error', 'Failed to load models', error.message);
            });
        });
    </script>
</body>

</html>
