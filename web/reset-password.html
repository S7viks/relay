<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password - GAIOL</title>

    <!-- Mono font (terminal UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-page auth-terminal">
        <div class="auth-container">
            <div class="auth-card">
                <div class="term-bar" aria-hidden="true">
                    <span class="term-dot"></span>
                    <span class="term-dot"></span>
                    <span class="term-dot"></span>
                    <span class="term-title">gaiol://auth/reset-password</span>
                </div>
                <div class="auth-header">
                    <h1>Set new password</h1>
                    <p>Complete the recovery flow to restore access.</p>
                </div>
                <div class="term-screen" aria-hidden="true">
                    <div class="line comment">reset token: from email link</div>
                    <div class="line"><span class="prompt"></span><span class="out">gaiol auth update-password</span><span class="blink">█</span></div>
                </div>
                <div id="noTokenMessage" class="term-inline-box" style="display: none;">
                    <p class="term-message">Open the password reset link from your email to set a new password on this page.</p>
                    <a class="link-text" href="/login">Back to sign in</a>
                </div>
                <div id="formContainer" style="display: none;">
                    <form id="resetForm" class="auth-form">
                        <div class="form-group">
                            <label for="newPassword">New password</label>
                            <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm password</label>
                            <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn-primary btn-full" id="submitBtn">Update password</button>
                    </form>
                    <p id="formMessage" class="term-message" style="display: none;"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            function getHashParams() {
                var hash = window.location.hash.slice(1);
                var params = {};
                hash.split('&').forEach(function (p) {
                    var kv = p.split('=');
                    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
                });
                return params;
            }
            var params = getHashParams();
            var accessToken = params.access_token || params['access_token'];
            var noTokenEl = document.getElementById('noTokenMessage');
            var formEl = document.getElementById('formContainer');
            var form = document.getElementById('resetForm');
            var msgEl = document.getElementById('formMessage');
            var submitBtn = document.getElementById('submitBtn');
            if (!accessToken) {
                noTokenEl.style.display = 'block';
                return;
            }
            formEl.style.display = 'block';
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var newP = document.getElementById('newPassword').value;
                var confirmP = document.getElementById('confirmPassword').value;
                if (newP !== confirmP) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = 'Passwords do not match';
                    msgEl.className = 'term-message error';
                    return;
                }
                if (newP.length < 6) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = 'Password must be at least 6 characters';
                    msgEl.className = 'term-message error';
                    return;
                }
                submitBtn.disabled = true;
                msgEl.style.display = 'none';
                fetch('/api/auth/update-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify({ password: newP })
                }).then(function (r) {
                    return r.json().then(function (data) {
                        if (r.ok && data.success) {
                            msgEl.style.display = 'block';
                            msgEl.textContent = 'Password updated. Redirecting to sign in...';
                            msgEl.className = 'term-message success';
                            setTimeout(function () { window.location.href = '/login'; }, 1500);
                        } else {
                            msgEl.style.display = 'block';
                            msgEl.textContent = data.error || data.message || 'Update failed';
                            msgEl.className = 'term-message error';
                            submitBtn.disabled = false;
                        }
                    }).catch(function () {
                        msgEl.style.display = 'block';
                        msgEl.textContent = r.statusText || 'Update failed';
                        msgEl.className = 'term-message error';
                        submitBtn.disabled = false;
                    });
                }).catch(function (err) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = err.message || 'Network error';
                    msgEl.className = 'term-message error';
                    submitBtn.disabled = false;
                });
            });
        })();
    </script>
</body>
</html>
