<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - GAIOL</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="GAIOL - Unified AI Model Orchestration Platform. Compare and query multiple AI models through a single interface.">
    <meta name="keywords" content="AI, machine learning, LLM, GPT, AI models, model comparison, AI orchestration">
    <meta name="author" content="GAIOL">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gaiol.app/">
    <meta property="og:title" content="GAIOL - AI Model Orchestration Platform">
    <meta property="og:description" content="Compare and query multiple AI models through a unified interface">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://gaiol.app/">
    <meta property="twitter:title" content="GAIOL - AI Model Orchestration">
    <meta property="twitter:description" content="Compare and query multiple AI models">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png">
    
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        // Immediate auth check - redirect to login if not authenticated
        // This runs before page content loads
        (function() {
            try {
                const token = localStorage.getItem('gaiol_access_token');
                if (!token) {
                    window.location.href = '/login.html';
                }
            } catch (e) {
                // If localStorage fails, redirect to login
                window.location.href = '/login.html';
            }
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Chat Page -->
            <div id="chatPage" class="page active">
                <div class="welcome-section" id="welcomeSection">
                    <h2>Start a conversation</h2>
                    <p>Enter a prompt to begin. The system will automatically select the best model for your query.</p>
                    
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="setQuickPrompt('Write copy')">
                            <span>Write copy</span>
                        </button>
                        <button class="quick-action-btn" onclick="setQuickPrompt('Explain concept')">
                            <span>Explain concept</span>
                        </button>
                        <button class="quick-action-btn" onclick="setQuickPrompt('Generate code')">
                            <span>Generate code</span>
                        </button>
                        <button class="quick-action-btn" onclick="setQuickPrompt('Summarize text')">
                            <span>Summarize text</span>
                        </button>
                    </div>
                </div>

                <!-- Chat Messages Area -->
                <div class="chat-messages" id="chatMessages"></div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea 
                            id="promptInput" 
                            class="prompt-input-modern" 
                            placeholder="Enter your prompt here..."
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button class="input-action-btn" title="Attach file" aria-label="Attach file">
                                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M15.5 4.5l-7 7-3-3-3 3 3 3 7-7 3 3-3 3"/>
                                </svg>
                            </button>
                            <button class="input-action-btn" title="Voice input" aria-label="Voice input">
                                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M10 1v6M10 13v6M5 6v4a5 5 0 0 0 10 0V6"/>
                                </svg>
                            </button>
                            <button class="input-action-btn" title="Browse prompts" aria-label="Browse prompts">
                                <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="9" cy="9" r="7"/>
                                    <path d="M17 17l-4-4"/>
                                </svg>
                            </button>
                        </div>
                        <div class="input-footer">
                            <span id="charCount" class="char-count">0 / 3000</span>
                            <button class="send-btn" id="sendBtn" onclick="handleQuerySubmit()" aria-label="Send">
                                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M18 2L9 11M18 2L12 18L9 11M18 2L2 8L9 11"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/models.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/features.js"></script>
    <script src="/js/sidebar-features.js"></script>
    <script src="/js/design-enhancements.js"></script>
    
    <script>
        // Initialize layout for chat page
        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for auth.js to load
            await new Promise(resolve => {
                if (typeof isAuthenticated === 'function') {
                    resolve();
                } else {
                    // Wait up to 1 second for auth.js to load
                    let attempts = 0;
                    const checkAuth = setInterval(() => {
                        attempts++;
                        if (typeof isAuthenticated === 'function' || attempts > 20) {
                            clearInterval(checkAuth);
                            resolve();
                        }
                    }, 50);
                }
            });
            
            // Check authentication first
            if (typeof isAuthenticated === 'function' && !isAuthenticated()) {
                // Redirect to login if not authenticated
                window.location.href = '/login.html';
                return;
            }
            
            initializeLayout('Chat', 'chat');
        });
    </script>
</body>
</html>
